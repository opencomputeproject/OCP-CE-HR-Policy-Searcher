    Legislative Technology Services Bureau). Email notification service available 
    for bill tracking. Capitol location: 2 East Main St, Madison. Primary gateway
    to docs.legis.wisconsin.gov for detailed bill text and committee information.
    Simple HTML interface, does not require JavaScript for basic navigation.

