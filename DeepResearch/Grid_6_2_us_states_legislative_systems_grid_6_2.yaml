    - "utilities"
    - "energy"
    - "efficiency"
  policy_types:
    - "regulation"
  verified_by: "Deep Research"
  verified_date: "2026-01-08"
  notes: |
    Wisconsin Administrative Code via Legislative Documents portal. PSC (Public 
    Service Commission) Chapter 137 - Focus on Energy statewide efficiency program:
    137.05 (minimum requirements), 137.07 (large customer programs), 137.08 
    (voluntary utility programs), 137.09 (self-directed programs for customers 
    >1,000 kWh monthly or >10,000 dekatherms). Wis. Stat. 196.374 enables PSC 
    efficiency regulation; 2005 Wisconsin Act 141 requires IOUs spend 1.2% gross 
    operating revenues on efficiency/renewables. Total Resource Cost (TRC) test
    with 10% environmental adder per PSC rules. Focus on Energy delivered through
    SEERA (Statewide Energy Efficiency and Renewables Administration) via 
    competitive bid. Cross-reference with PSC dockets for pending rulemakings.


