    Key programs: Grid Resilience Grant Program ($10M+), EECBG, Energy Innovation
    Grant Program ($7.8M), Rural Energy Startup Program (RESP) for disadvantaged
    communities, Critical Infrastructure Microgrid pilot grants ($900K).
    2005 Wisconsin Act 141 requires IOUs spend 1.2% gross revenues on efficiency.
    Municipal/co-op utilities collect $8/meter average. Quadrennial review process
    sets goals (completed QP IV in 2022). Biennial Strategic Energy Assessment.
    Microsoft and others expanding data center presence in Wisconsin.

