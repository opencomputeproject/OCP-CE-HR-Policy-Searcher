# US States - Energy Ministries/Offices
# Generated: 2026-01-08
# Grid Cell: 6.1
# Region: Iowa, Indiana, Nevada, Utah, South Carolina, Tennessee, Montana, Wisconsin
#
# Context: These 8 US states have significant data center presence but were not
# previously covered in the policy tracker. Each state has a designated State 
# Energy Office (SEO) that receives federal DOE funding and implements energy
# efficiency programs. Structure varies - some are standalone agencies, others
# within economic development, environmental, or regulatory departments.
#
# Data Center Presence:
# - Iowa: Google, Meta, Microsoft in Council Bluffs/Altoona; benefits from wind energy
# - Indiana: Growing Indianapolis market; crossroads connectivity
# - Nevada: Reno/Tahoe market; Switch facilities; massive $100B investments planned
# - Utah: Salt Lake City market; Meta, NSA facilities; cold climate benefits
# - South Carolina: Google, Meta facilities; low electricity costs; nuclear power
# - Tennessee: Nashville emerging market; TVA power region
# - Montana: Emerging market; hydropower and cold climate advantages
# - Wisconsin: Microsoft and others expanding; strong efficiency programs

