# 
# PATTERNS DISCOVERED:
# - States with specific data center incentives: Iowa, Indiana, Nevada, 
#   South Carolina, Tennessee
# - States without specific DC incentives but with applicable programs: 
#   Utah (EDTIF), Montana (no sales tax), Wisconsin (Enterprise Zones)
# - Investment thresholds range widely: $10M (Indiana smaller counties) 
#   to $250M (Tennessee)
# - Job creation requirements typically 10-50 jobs at 100-150% average wage
# - Exemption periods: 10-50 years depending on investment size
# - Most states have clawback provisions for non-compliance
#
# TECHNICAL NOTES:
# - Most economic development sites work without JavaScript
# - Legislative sites often require Playwright for bill search functionality
# - State .gov domains are generally stable and well-maintained
# - Rate limiting 2-3 seconds recommended for government sites
#
# RECOMMENDATIONS FOR YAML ORGANIZATION:
# - These sites fit well in a "domains_us_states_economic_dev.yaml" file
# - Can be combined with existing US state energy/environmental sites
# - Regional grouping by policy type (economic_dev, regulatory, legislative) 
#   works well within state groupings
#
# PRIORITY FOR POLICY TRACKER EXPANSION:
# 1. Iowa (highest DC investment, most active policy changes)
# 2. Indiana (rapid growth, recent large approvals)
# 3. Nevada (established program, hyperscale presence)
# 4. Tennessee (growing market, comprehensive incentives)
# 5. South Carolina (Google presence, 2031 sunset approaching)
# 6. Utah (growing market, recent legislation)
# 7. Wisconsin/Montana (lower priority, no specific DC incentives)
#
# HEAT REUSE RELEVANCE:
# - None of these economic development programs specifically address heat 
#   reuse, but they establish the policy framework for data center development
# - Heat reuse requirements could potentially be added as conditions for 
#   receiving incentives (similar to job creation requirements)
# - Tracking these programs helps identify where data centers are being built,
#   which is prerequisite information for heat reuse policy advocacy
