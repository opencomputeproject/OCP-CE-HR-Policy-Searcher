# Monthly automated policy scan + static explorer publish.
#
# Requires repository secrets:
#   ANTHROPIC_API_KEY   - funds the analysis stage (bounded: one scan/month)
#   GOOGLE_CREDENTIALS  - optional, base64 service account for Sheets export
#   SPREADSHEET_ID      - optional, target spreadsheet for the Staging tab
#
# Publishing to GitHub Pages requires Pages to be enabled for the repo
# (Settings -> Pages -> Source: GitHub Actions).
#
# Action references are pinned to full commit SHAs (supply-chain hygiene);
# the trailing comment records the tag each SHA corresponds to.

name: Monthly Policy Scan

on:
  schedule:
    # 06:00 UTC on the 1st of each month
    - cron: "0 6 1 * *"
  workflow_dispatch:
    inputs:
      group:
        description: "Domain group to scan (from config/groups.yaml)"
        required: false
        default: "all"

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: monthly-scan
  cancel-in-progress: false

jobs:
  scan:
    runs-on: ubuntu-latest
    timeout-minutes: 300
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - uses: actions/setup-python@42375524e23c412d93fb67b49958b491fce71c38 # v5.4.0
        with:
          python-version: "3.12"
          cache: pip

      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[browser]"
          playwright install chromium --with-deps

      - name: Run scan
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GOOGLE_CREDENTIALS: ${{ secrets.GOOGLE_CREDENTIALS }}
          SPREADSHEET_ID: ${{ secrets.SPREADSHEET_ID }}
          # Pass workflow input through env to avoid script injection via ${{ }}
          SCAN_GROUP: ${{ inputs.group || 'all' }}
        run: |
          python -m src.agent "Scan the $SCAN_GROUP group and report results"

      - name: Build static explorer
        run: python scripts/build_explorer.py data/policies.json explorer/index.html

      - name: Upload policies dataset
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: policies-${{ github.run_id }}
          path: |
            data/policies.json
            data/logs/audit.jsonl
          retention-days: 90

      # Artifacts expire and nobody reliably downloads them — persist the
      # actual output to a dedicated branch so scan results are durable.
      - name: Persist scan outputs to ci-data branch
        continue-on-error: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -e
          DATE=$(date -u +%Y-%m-%d)
          DEST_DIR="scans/${DATE}"
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          REMOTE="https://x-access-token:${GITHUB_TOKEN}@github.com/${GITHUB_REPOSITORY}.git"
          WORKDIR=$(mktemp -d)
          if git ls-remote --exit-code --heads "$REMOTE" ci-data > /dev/null 2>&1; then
            git clone --branch ci-data --depth 1 "$REMOTE" "$WORKDIR"
          else
            git clone --no-checkout "$REMOTE" "$WORKDIR"
            git -C "$WORKDIR" checkout --orphan ci-data
            git -C "$WORKDIR" rm -rf . > /dev/null 2>&1 || true
          fi
          mkdir -p "$WORKDIR/$DEST_DIR"
          cp data/policies.json "$WORKDIR/$DEST_DIR/policies.json"
          cp data/logs/audit.jsonl "$WORKDIR/$DEST_DIR/audit.jsonl"
          git -C "$WORKDIR" add "$DEST_DIR"
          git -C "$WORKDIR" commit -m "chore(ci-data): add ${DEST_DIR} from run ${GITHUB_RUN_ID}" || echo "Nothing to commit"
          git -C "$WORKDIR" push origin ci-data

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@56afc609e74202658d3ffba0e8f6dda462b719fa # v3.0.1
        with:
          path: explorer/

  publish:
    needs: scan
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@d6db90164ac5ed86f2b6aed7e0febac5b3c0c03e # v4.0.5
