# Weekly news-signal sweep: free data sources -> lead queue.
#
# Cheap by design: GDELT, Google News RSS, and trade feeds cost nothing;
# the only spend is Haiku triage of headlines (cents). Discovered leads
# land in data/leads.json as a build artifact for review — chasing a
# lead (full analysis) stays a human decision.
#
# Optional secret: ANTHROPIC_API_KEY (without it, leads skip triage and
# are all kept for human review).

name: Weekly Policy Signals

on:
  schedule:
    # 06:30 UTC every Monday
    - cron: "30 6 * * 1"
  workflow_dispatch: {}

permissions:
  contents: write

concurrency:
  group: weekly-signals
  cancel-in-progress: false

jobs:
  signals:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - uses: actions/setup-python@42375524e23c412d93fb67b49958b491fce71c38 # v5.4.0
        with:
          python-version: "3.12"
          cache: pip

      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install -e .

      - name: Run news signals sweep
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: python -m src.agent --signals

      - name: Upload lead queue
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: leads-${{ github.run_id }}
          path: data/leads.json
          if-no-files-found: warn
          retention-days: 90

      # Artifacts expire and nobody reliably downloads them — persist the
      # actual output to a dedicated branch so leads survive past retention.
      - name: Persist leads to ci-data branch
        continue-on-error: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -e
          DATE=$(date -u +%Y-%m-%d)
          DEST="signals/${DATE}-leads.json"
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          REMOTE="https://x-access-token:${GITHUB_TOKEN}@github.com/${GITHUB_REPOSITORY}.git"
          WORKDIR=$(mktemp -d)
          if git ls-remote --exit-code --heads "$REMOTE" ci-data > /dev/null 2>&1; then
            git clone --branch ci-data --depth 1 "$REMOTE" "$WORKDIR"
          else
            git clone --no-checkout "$REMOTE" "$WORKDIR"
            git -C "$WORKDIR" checkout --orphan ci-data
            git -C "$WORKDIR" rm -rf . > /dev/null 2>&1 || true
          fi
          mkdir -p "$WORKDIR/$(dirname "$DEST")"
          cp data/leads.json "$WORKDIR/$DEST"
          git -C "$WORKDIR" add "$DEST"
          git -C "$WORKDIR" commit -m "chore(ci-data): add ${DEST} from run ${GITHUB_RUN_ID}" || echo "Nothing to commit"
          git -C "$WORKDIR" push origin ci-data
