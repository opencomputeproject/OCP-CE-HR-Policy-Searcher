name: Monthly Policy Scan

on:
  # Run on 15th of each month at 9:00 AM UTC
  # This gives time before the first Tuesday meeting
  schedule:
    - cron: '0 9 15 * *'

  # Allow manual trigger
  workflow_dispatch:
    inputs:
      domains:
        description: 'Domain group to scan'
        required: false
        default: 'all'
        type: choice
        options:
          - all
          - eu
          - us
          - federal
          - test
          - quick
      dry_run:
        description: 'Dry run (no Sheets write)'
        required: false
        default: false
        type: boolean
      skip_llm:
        description: 'Skip LLM analysis'
        required: false
        default: false
        type: boolean

env:
  PYTHON_VERSION: '3.12'

jobs:
  scan:
    name: Policy Scan
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'

      - name: Install dependencies
        run: |
          pip install -e .
          playwright install chromium

      - name: Run policy scan
        id: scan
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GOOGLE_CREDENTIALS: ${{ secrets.GOOGLE_CREDENTIALS }}
          SPREADSHEET_ID: ${{ secrets.SPREADSHEET_ID }}
        run: |
          # Build command with options
          CMD="python -m src.main"
          CMD="$CMD --domains ${{ github.event.inputs.domains || 'all' }}"

          if [ "${{ github.event.inputs.dry_run }}" = "true" ]; then
            CMD="$CMD --dry-run"
          fi

          if [ "${{ github.event.inputs.skip_llm }}" = "true" ]; then
            CMD="$CMD --skip-llm"
          fi

          echo "Running: $CMD"
          $CMD

      - name: Upload logs
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: run-logs-${{ github.run_id }}
          path: logs/
          retention-days: 90

      - name: Upload snapshots
        uses: actions/upload-artifact@v4
        if: success()
        with:
          name: snapshots-${{ github.run_id }}
          path: snapshots/
          retention-days: 30

      # Optional: Commit snapshots to repo
      - name: Commit snapshots
        if: success() && github.event.inputs.dry_run != 'true'
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add snapshots/
          git diff --staged --quiet || git commit -m "Add snapshots from run ${{ github.run_id }}"
          git push
        continue-on-error: true

  notify:
    name: Send Notification
    runs-on: ubuntu-latest
    needs: scan
    if: always()

    steps:
      - name: Notify on success
        if: needs.scan.result == 'success'
        run: |
          echo "Scan completed successfully"
          # Add Slack/email notification here if configured

      - name: Notify on failure
        if: needs.scan.result == 'failure'
        run: |
          echo "Scan failed"
          # Add Slack/email notification here if configured
