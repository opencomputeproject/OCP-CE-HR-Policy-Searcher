      - "buildings"
    policy_types:
      - "regulation"
      - "standard"
    verified_by: "Deep Research"
    verified_date: "2026-01-08"
    notes: |
      Utah Administrative Code official database. Key sections: R746 (Public Service 
      Commission rules for utilities), R305 (Division of Air Quality - emissions), 
      R156-56 (Building codes including energy efficiency). Utah PSC regulates Rocky 
      Mountain Power and Dominion Energy. R746-312 covers integrated resource planning.
      S.B. 217 (2022) established U-Save Energy Fund for public building efficiency 
      implemented through administrative rules. Utah requires utility energy efficiency 
      plans per Utah Code 54-7-12.8. Searchable by rule number, agency, or keyword.

