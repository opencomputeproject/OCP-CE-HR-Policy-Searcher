    policy_types:
      - "law"
    verified_by: "Deep Research"
    verified_date: "2026-01-08"
    notes: |
      Utah State Legislature official bill tracking and Utah Code access. 2025 General 
      Session completed (Jan 21 - Mar 7, 2025). Key committees: House Public Utilities 
      and Energy Committee (HSTPUT), Public Utilities, Energy, and Technology Interim 
      Committee (INTPUT). Bill tracking via My Legislature feature with RSS feeds.
      Governor vetoed HB0003, SB0003, SB0037, SB0296 in 2025 session. Utah Code Title 54 
      (Public Utilities) and Title 63M (State Resource Management) contain energy statutes.
      2025 session included significant nuclear energy discussions per HEAL Utah tracker.
      Legislature meets annually Jan-Mar. JavaScript required for committee pages and 
      bill search filters.

