    policy_types:
      - "guidance"
      - "incentive"
    verified_by: "Deep Research"
    verified_date: "2026-01-08"
    notes: |
      Energy efficiency focused portal. Partners with Intermountain Industrial
      Assessment Center for no-cost energy consulting to manufacturers (10-20%
      savings identified). Home Energy Scorecard pilot program per state legislation.
      Rocky Mountain Power Wattsmart program incentives. Dominion Energy ThermWise
      program for natural gas efficiency. Weatherization Assistance Program delivers
      ~35% savings (~$583/year) to low-income households.

