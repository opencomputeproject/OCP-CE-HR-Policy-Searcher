      - "tax_credit"
    policy_types:
      - "incentive"
      - "guidance"
    verified_by: "Deep Research"
    verified_date: "2026-01-15"
    notes: |
      Utah GOEO (formerly GOED) administers EDTIF (Economic Development Tax 
      Increment Financing) program. Data centers can qualify for refundable tax 
      credits up to 30% of new state taxes generated over 5-20 years. Senate Bill 
      114 (2020) modified sales/use tax exemption for data centers 150,000+ sq ft.
      U.C.A. 63N-2-106(2) governs incentives. Requires 50+ jobs at 110% county 
      average wage for urban areas. Meta expansion in Eagle Mountain utilized 
      these incentives.

