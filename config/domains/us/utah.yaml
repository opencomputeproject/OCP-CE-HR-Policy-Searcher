    tags:
      - "efficiency"
      - "incentives"
      - "planning"
    policy_types:
      - "guidance"
      - "incentive"
      - "report"
    verified_by: "Deep Research"
    verified_date: "2026-01-08"
    notes: |
      Utah's primary office for energy and critical mineral development. Implements
      state's Strategic Energy Plan. Operation Gigawatt initiative to double power
      capacity. U-Save Energy Fund provides low-interest loans for public buildings.
      Utah Energy Infrastructure Authority can authorize tax-free bonds for
      transmission and pipeline projects. Governor's Energy Development Summit
      is largest energy event in the West. Meta (Appaloosa Solar Farm) in Cedar City.
      Google opening Salt Lake City data center. NSA Utah Data Center at Camp Williams.
      Second-fastest internet speeds in US.

