# =============================================================================
# WASHINGTON (WA)
# =============================================================================
# State abbreviation: WA
# Region: us, us_states
# =============================================================================

domains:
  - name: "Washington State Department of Commerce - Energy"
    id: "wa_commerce"
    enabled: true
    region:
      - "us"
      - "us_states"
      - "washington"
    base_url: "https://www.commerce.wa.gov"
    start_paths:
      - "/growing-the-economy/energy"
      - "/energy/low-carbon-energy"
    max_depth: 2
    language: "en"
    requires_playwright: false
    rate_limit_seconds: 2.0
    category: "economic_dev"
    tags:
      - "incentives"
      - "carbon"
    policy_types:
      - "incentive"
      - "guidance"
    notes: "Renewable energy requirements, major data center presence"

  - name: "Washington State Legislature - Bill Information"
    id: "wa_legislature"
    enabled: true
    region:
      - "us"
      - "us_states"
      - "washington"
    base_url: "https://app.leg.wa.gov"
    start_paths:
      - "/billinfo/"
    allowed_path_patterns:
      - "/billinfo/*"
      - "/billsummary*"
    max_depth: 2
    language: "en"
    requires_playwright: false
    rate_limit_seconds: 2.0
    category: "legislative"
    tags:
      - "mandates"
      - "efficiency"
    policy_types:
      - "law"
    notes: |
      Added 2026-07-07 from recall/coverage audit: WA hosts major data center
      clusters (Quincy) but had no legislature coverage (only Commerce).
      Bill information portal for tracking energy and data center bills.

