      - "data_center"
    policy_types:
      - "incentive"
      - "guidance"
    verified_by: "Deep Research"
    verified_date: "2026-01-15"
    notes: |
      SC Commerce certifies qualifying data centers for sales tax exemptions. 
      Requirements: $50M investment (or $75M combined) in real/personal property 
      over 5 years, 25 jobs at 150% state/county per capita wage (whichever lower),
      maintain jobs 3 years. Exemption covers computer equipment, software, 
      electricity. Google has $1.2B+ investment in state. HB 3720 (2012) created 
      program; expires December 31, 2031 unless renewed.

