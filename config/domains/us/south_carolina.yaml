    requires_playwright: false
    rate_limit_seconds: 2.0
    category: "energy_ministry"
    tags:
      - "efficiency"
      - "incentives"
      - "planning"
    policy_types:
      - "guidance"
      - "incentive"
      - "report"
    verified_by: "Deep Research"
    verified_date: "2026-01-08"
    notes: |
      Principal energy planning entity for South Carolina per SC Energy Efficiency
      Act (1992, SC Code 48-52). Part of Office of Regulatory Staff. Develops
      comprehensive state energy plan. EECBG Program funding available.
      Palmetto Clean Fuels Coalition promotes alternative fuels.
      Google and Meta have major facilities in the state. Low electricity costs
      and nuclear power availability attract data centers.
      State Energy Action Plan submitted annually to Governor and legislature.

