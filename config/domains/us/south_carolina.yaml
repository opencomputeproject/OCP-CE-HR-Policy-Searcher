      - "economic_development"
      - "nuclear"
    policy_types:
      - "law"
    verified_by: "Deep Research"
    verified_date: "2026-01-08"
    notes: |
      South Carolina Legislature Online - 126th General Assembly (2025-2026). Bill search
      by number, keyword, subject, sponsor. Key recent legislation: H.B. 5118/S.B. 909 
      (2023-24) - "South Carolina Ten-Year Energy Transformation Act" addressing data 
      center-driven energy demand, grid reliability, new generation requirements; 
      H.B. 3309 (2025-26) - "South Carolina Energy Security Act" requiring comprehensive 
      state energy assessment, encouraging nuclear (SMRs, fusion) at brownfield sites.
      Legislative findings cite "rapidly expanding population and record-breaking economic 
      development" driving energy infrastructure needs. Title 58 (Public Utilities) 
      contains SC Code provisions. Labor, Commerce and Industry Committee handles 
      utility/energy legislation. JavaScript required for bill search functionality.

