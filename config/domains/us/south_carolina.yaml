    verified_date: "2026-01-08"
    notes: |
      ORS represents public interest in utility regulation for electric, natural gas,
      telecommunications, transportation, water/wastewater. Houses State Energy Office.
      Works with SC Public Service Commission on utility energy efficiency plans.
      SC Code Title 48-52 establishes energy efficiency requirements.
      H.B. 4766 (2008) requires 20% energy reduction by 2020 from 2000 baseline
      for state agencies and school districts.

