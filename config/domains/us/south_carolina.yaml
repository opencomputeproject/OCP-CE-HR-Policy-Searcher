      - "energy"
      - "efficiency"
    policy_types:
      - "law"
    verified_by: "Deep Research"
    verified_date: "2026-01-08"
    notes: |
      South Carolina Code of Laws - statutory database. Title 58 (Public Utilities, 
      Services and Carriers) - core utility regulation including PSC authority, 
      electrical utilities (Ch 27), certificates of public convenience (Ch 33), 
      energy efficiency (Ch 37). Title 48 Chapter 52 - SC Energy Efficiency Act (1992)
      establishing SC Energy Office within Office of Regulatory Staff, requiring 
      20% energy reduction by 2020 from 2000 baseline for state agencies (H.B. 4766, 2008).
      SC Code 48-52-620 establishes state energy policy. Codified statutes reflect 
      enacted legislation; check session laws for recent changes.

