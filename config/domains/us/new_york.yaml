# =============================================================================
# NEW YORK (NY)
# =============================================================================
# State abbreviation: NY
# Region: us, us_states
# =============================================================================

domains:
  - name: "New York State Energy Research and Development Authority"
    id: "nyserda"
    enabled: true
    region:
      - "us"
      - "us_states"
      - "new_york"
    base_url: "https://www.nyserda.ny.gov"
    start_paths:
      - "/All-Programs/Energy-Efficiency"
      - "/All-Programs/Clean-Energy-Businesses"
    max_depth: 2
    language: "en"
    requires_playwright: true
    rate_limit_seconds: 2.0
    category: "economic_dev"
    tags:
      - "incentives"
      - "efficiency"
      - "research"
    policy_types:
      - "incentive"
      - "guidance"
      - "report"
    notes: "NY state energy efficiency incentives"

  - name: "New York State Senate - Legislation Search"
    id: "ny_legislature"
    enabled: true
    region:
      - "us"
      - "us_states"
      - "new_york"
    base_url: "https://www.nysenate.gov"
    start_paths:
      - "/search/legislation?searched=waste+heat"
    allowed_path_patterns:
      - "/search/legislation*"
      - "/legislation/bills/*"
    max_depth: 2
    language: "en"
    requires_playwright: false
    rate_limit_seconds: 2.0
    category: "legislative"
    tags:
      - "mandates"
      - "efficiency"
    policy_types:
      - "law"
    notes: |
      Added 2026-07-07 from recall/coverage audit: NY is a top data center
      market with no legislature bill-search coverage (only NYSERDA).
      NY Senate legislation search seeded on waste heat.

