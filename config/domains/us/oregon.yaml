  - name: "Oregon Energy Efficiency Specialty Code 2025"
    id: "or_building_codes"
    enabled: true
    region:
      - "us"
      - "us_states"
      - "oregon"
    base_url: "https://www.oregon.gov"
    start_paths:
      - "/bcd/codes-stand/Documents/25oeesc.pdf"
    max_depth: 1
    language: "en"
    requires_playwright: false
    rate_limit_seconds: 2.0
    category: "building_codes"
    tags:
      - "mandatory"
      - "ashrae_90_4"
      - "hvac"
      - "power_distribution"
    policy_types:
      - "building_codes"
      - "energy_efficiency"
    verified_by: "Deep Research"
    verified_date: "2026-02-03"
    notes: |
      Oregon Energy Efficiency Specialty Code (OEESC) 2025.
      DCs >100 kW IT load must comply with ASHRAE Standard 90.4.
      'Energy Standard for Data Centers' covering HVAC and power distribution.
      Effective July 1, 2025.

