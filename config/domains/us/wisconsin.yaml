    verified_by: "Deep Research"
    verified_date: "2026-01-15"
    notes: |
      Wisconsin has NO specific data center tax incentive legislation. However, 
      Enterprise Zone Tax Credits may apply to major data center expansions 
      ($100M+ projects). WEDC approved $91.5M in total incentives FY2025 
      (highest in 5 years). Enterprise Zones require WEDC designation and Joint 
      Committee on Finance review. Qualified New Business Venture credits 
      (25% of equity investment) may benefit early-stage tech. Microsoft has 
      presence in state. Eli Lilly received $100M Enterprise Zone credits for 
      $4B expansion (2025).

