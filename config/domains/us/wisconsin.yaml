    verified_by: "Deep Research"
    verified_date: "2026-01-08"
    notes: |
      PSC Chapter 137 - Statewide Energy Efficiency and Renewable Resource Programs.
      Key sections: 137.05 (minimum requirements), 137.07 (large customer programs),
      137.08 (voluntary utility programs), 137.09 (self-directed programs for large
      customers >1,000 kWh monthly or >10,000 dekatherms). Wis. Stat. 196.374
      establishes statutory framework. Wis. Stat. 196.491(2)(a) requires biennial
      Strategic Energy Assessment. Total Resource Cost (TRC) primary cost-effectiveness
      test with 10% environmental adder in societal cost test.

