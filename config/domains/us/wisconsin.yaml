      Wisconsin Legislative Documents - comprehensive bills, statutes, administrative 
      code. 2025 Assembly Committee on Energy and Utilities (Committee 2918) handles 
      utility legislation including PSC authority, wind/solar siting, transmission,
      battery storage, nuclear prioritization. Key 2025 bills: AB7/SB3 - local approval
      for wind/solar before PSC approval; bills on transmission facilities, EV charging
      tax exemptions. Wisconsin Statutes Chapter 196 (Public Utilities) - PSC authority
      including 196.374 (energy efficiency), 196.491 (strategic energy assessment, 
      generating facilities, transmission). Chapter 66.0401 - wind/solar siting.
      Search by statute section, bill number, or browse by committee. JavaScript 
      required for full functionality.

