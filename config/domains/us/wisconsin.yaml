  - name: "Wisconsin Public Service Commission - Office of Energy Innovation"
    id: "us_wi_psc_oei"
    enabled: true
    base_url: "https://psc.wi.gov"
    start_paths:
      - "/Pages/ServiceType/OfficeEnergyInnovation.aspx"
    allowed_path_patterns:
      - "/Pages/ServiceType/OfficeEnergyInnovation*"
