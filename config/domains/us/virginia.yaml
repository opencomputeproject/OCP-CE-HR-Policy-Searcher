# =============================================================================
# VIRGINIA (VA)
# =============================================================================
# State abbreviation: VA
# Region: us, us_states
# =============================================================================

domains:
  - name: "Virginia Department of Energy"
    id: "va_energy"
    enabled: true
    region:
      - "us"
      - "us_states"
    base_url: "https://www.energy.virginia.gov"
    start_paths:
      - "/energy-efficiency"
      - "/renewable-energy"
    max_depth: 2
    language: "en"
    requires_playwright: false
    rate_limit_seconds: 2.0
    category: "energy_ministry"
    tags:
      - "mandates"
      - "efficiency"
      - "carbon"
    policy_types:
      - "law"
      - "regulation"
    notes: |
      Largest US data center market (575+ facilities).
      HB 116/SB 192 proposed: 90% carbon-free energy by 2027.
      Delegate Rip Sullivan authored Virginia Clean Economy Act.

  - name: "Virginia General Assembly"
    id: "va_legislature"
    enabled: true
    region:
      - "us"
      - "us_states"
    base_url: "https://lis.virginia.gov"
    start_paths:
      - "/cgi-bin/legp604.exe?ses=251&typ=bil&val=hb116"
      - "/cgi-bin/legp604.exe?ses=251&typ=bil&val=sb192"
    allowed_path_patterns:
      - "/cgi-bin/legp604.exe*"
    max_depth: 1
    language: "en"
    requires_playwright: true
    rate_limit_seconds: 3.0
    category: "legislative"
    tags:
      - "mandates"
      - "efficiency"
    policy_types:
      - "law"
    notes: |
      Track HB 116/SB 192: Data center energy efficiency requirements.
      Most active state for data center legislation (28 bills in 2025).

  - name: "Virginia HB323 - Data Center Heat Reuse Study"
    id: "us_va_hb323_2026"
    enabled: true
    base_url: "https://lis.virginia.gov"
    start_paths:
      - "/bill-details/20261/HB323"
    allowed_path_patterns:
      - "/bill-details/*"
      - "/bill-text/*"
      - "/vote/*"
    blocked_path_patterns:
      - "/session-details/*"    # Site-specific: irrelevant session navigation pages
    max_depth: 2
    max_pages: 20              # Tight budget: SPA with many nav links
    min_keyword_score: 3.0     # Terse legislative text scores low; URL bonuses compensate
    language: "en"
    region:
      - "us"
      - "us_states"
      - "virginia"
    requires_playwright: true  # Site is JavaScript SPA - requires rendering
    rate_limit_seconds: 3.0
    category: "legislation"
    tags:
      - "pending"
      - "study"
      - "waste_heat"
      - "department_of_energy"
      - "data_center_specific"
    policy_types:
      - "legislation"
      - "waste_heat_recovery"
    verified_by: "Web Search - News Coverage"
    verified_date: "2026-02-03"
    sponsor: "Del. Rip Sullivan (D-Fairfax)"
    session: "2026 Regular Session"
    status: "Introduced"
    notes: |
        Directs Virginia Department of Energy to study ways to utilize 
        data center waste heat for surrounding buildings.
        Modeled after European examples (Nordic district heating).
        Sullivan is key OCP ally - participated in OCP Heat Reuse webinar.
        Related bills: HB906 (load flexibility), HB824 (energy generation/storage).
        NOTE: lis.virginia.gov requires JavaScript/Playwright to render content.