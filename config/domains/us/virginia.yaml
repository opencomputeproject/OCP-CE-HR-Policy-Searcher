# =============================================================================
# VIRGINIA (VA)
# =============================================================================
# State abbreviation: VA
# Region: us, us_states
# =============================================================================

domains:
  - name: "Virginia Department of Energy"
    id: "va_energy"
    enabled: true
    region:
      - "us"
      - "us_states"
    base_url: "https://www.energy.virginia.gov"
    start_paths:
      - "/energy-efficiency"
      - "/renewable-energy"
    max_depth: 2
    language: "en"
    requires_playwright: false
    rate_limit_seconds: 2.0
    category: "energy_ministry"
    tags:
      - "mandates"
      - "efficiency"
      - "carbon"
    policy_types:
      - "law"
      - "regulation"
    notes: |
      Largest US data center market (575+ facilities).
      HB 116/SB 192 proposed: 90% carbon-free energy by 2027.
      Delegate Rip Sullivan authored Virginia Clean Economy Act.

  - name: "Virginia General Assembly"
    id: "va_legislature"
    enabled: true
    region:
      - "us"
      - "us_states"
    base_url: "https://lis.virginia.gov"
    start_paths:
      - "/cgi-bin/legp604.exe?ses=251&typ=bil&val=hb116"
      - "/cgi-bin/legp604.exe?ses=251&typ=bil&val=sb192"
    max_depth: 1
    language: "en"
    requires_playwright: true
    rate_limit_seconds: 3.0
    category: "legislative"
    tags:
      - "mandates"
      - "efficiency"
    policy_types:
      - "law"
    notes: |
      Track HB 116/SB 192: Data center energy efficiency requirements.
      Most active state for data center legislation (28 bills in 2025).

