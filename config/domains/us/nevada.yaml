      - "carbon"
    policy_types:
      - "guidance"
      - "incentive"
      - "report"
    verified_by: "Deep Research"
    verified_date: "2026-01-08"
    notes: |
      Cabinet-level director position since 2001. Promotes policy, manages programs,
      distributes federal funding. Key programs: Renewable Energy Tax Abatement (RETA),
      Home Energy Retrofit Opportunities for Seniors (HEROS), Performance Contracting
      Audit Program (PCAAP). NRS Chapter 701 establishes energy policy framework.
      MASSIVE data center investment: Tract planning $100B in Storey County over 10 years.
      NV Energy projecting grid could quadruple for data centers.
      Greenlink West project ($4.2B) transmission backbone Las Vegas-Reno.
      Status of Energy Report published annually per NRS 701.170.

