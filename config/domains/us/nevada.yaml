    verified_date: "2026-01-08"
    notes: |
      Nevada Legislature official site with Nevada Revised Statutes (NRS) and bill 
      tracking (NELIS system). 36th Special Session (Nov 2025) recently concluded. 
      Critical chapters: NRS 701 (Energy Policy) - Governor's Office of Energy authority,
      renewable energy rights, state energy reports; NRS 704 (Public Utilities) - 
      portfolio standard (50% renewables by 2030, 100% carbon-free by 2050 per SB358 2019),
      energy efficiency measures, net metering, energy storage procurement. 
      Key recent legislation: SB448 (2021) - transportation electrification, regional 
      transmission; AB452 (2025) - fuel cost sharing; SB442 (2025) - utility disconnection
      reporting. Legislature meets biennially in odd years. JavaScript required for 
      NELIS bill search.

