      - "energy"
      - "efficiency"
    policy_types:
      - "regulation"
    verified_by: "Deep Research"
    verified_date: "2026-01-08"
    notes: |
      Nevada Administrative Code (NAC) - state agency regulations implementing NRS.
      NAC 701 contains energy policy regulations including energy efficiency programs
      administered by Governor's Office of Energy. NAC 704 contains Public Utilities 
      Commission of Nevada (PUCN) regulations implementing portfolio standards, net 
      metering, utility planning requirements. PUCN oversees NV Energy integrated 
      resource plans and rate cases. Regulations implement NRS 701.220 (2021 IECC 
      adoption requirement). Cross-reference with PUCN docket system for pending 
      rulemakings.

