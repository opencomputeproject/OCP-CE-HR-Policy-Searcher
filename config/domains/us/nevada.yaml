    policy_types:
      - "incentive"
      - "regulation"
    verified_by: "Deep Research"
    verified_date: "2026-01-15"
    notes: |
      Nevada GOED administers data center tax abatements. 10-year abatement: $25M 
      investment, 10 jobs at statewide average wage. 20-year abatement: $100M 
      investment, 50 jobs. Benefits include 75% personal property tax abatement 
      and sales/use tax reduced to 2%. Nev. Rev. Stat. § 360.754, § 361.0683. 
      Nevada requires 50%+ construction workers be state residents. Google, Switch 
      have received significant abatements ($25M+ per project).

