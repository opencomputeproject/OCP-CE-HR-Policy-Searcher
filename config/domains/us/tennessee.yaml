    verified_date: "2026-01-06"
    notes: |
      PRIORITY TARGET - Operating since 1974, one of first US cities to pair district energy with municipal solid waste. Rebuilt 2003 ($46M) using natural gas. Serves 42 downtown buildings including State Capitol, Music City Center, Ryman Auditorium, Bridgestone Arena. ~357M lbs steam, ~65M ton-hours chilled water annually. 91,100 ft underground pipes. Overseen by Metro Water Services. 50-year historic marker unveiled March 2025.

