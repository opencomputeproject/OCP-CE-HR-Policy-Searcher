    verified_date: "2026-01-08"
    notes: |
      TDEC Office of Energy Programs serves as Governor-designated State Energy Office.
      Annual reports required per Tenn. Code Ann. 4-3-510(9) and 4-3-1012(5).
      Key programs: Energy Efficiency and Renewable Energy Loan Program ($29M fund
      via Pathway Lending), Energy Efficient Schools Initiative, EECBG ($4.6M for
      distressed counties), Local Government Energy Efficiency Revolving Loan Fund.
      Coordinates with TVA EnergyRight for IRA Home Energy Rebates. Nashville
      emerging as data center market in TVA power region. Contact: 1-800-342-1340.

