    verified_date: "2026-01-08"
    notes: |
      Tennessee General Assembly - 114th General Assembly (2025-2026). Bill tracking 
      via My Bills personalized system (free account). Key committees: Senate Energy, 
      Agriculture and Natural Resources Committee (handles energy, natural resources, 
      pollution, conservation); Senate Commerce and Labor Committee; House equivalent 
      committees. Legislature composed of 27 Republicans, 6 Democrats (Senate); 73R, 24D, 
      1I (House). Sessions begin second Tuesday in January, usually adjourn mid-April.
      Bill search at wapp.capitol.tn.gov/apps/billsearch. Subject index available.
      First Extraordinary Session (Jan 2025) held. Tennessee Code Annotated Title 4 
      Chapter 3 Part 10 (TDEC OEP authority), Title 65 (Public Utilities) contain 
      relevant statutes. TVA dominates electricity market limiting state regulatory scope.

