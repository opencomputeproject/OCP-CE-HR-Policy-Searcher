    policy_types:
      - "incentive"
      - "guidance"
    verified_by: "Deep Research"
    verified_date: "2026-01-15"
    notes: |
      TNECD oversees Tennessee's data center incentive program. Requirements: 
      $250M capital investment over 3 years (extendable to 5-7 years for larger 
      projects), 25 jobs at 150% state average occupational wage. Sales tax 
      exemption on computers, computer systems, software, peripheral devices. 
      Reduced 1.5% sales tax rate on electricity. Backup power infrastructure 
      and cooling equipment also exempt. Tenn. Code Ann. § 67-6-206(c).

