    policy_types:
      - "guidance"
      - "incentive"
      - "report"
    verified_by: "Deep Research"
    verified_date: "2026-01-08"
    notes: |
      Iowa Energy Office manages state, federal, and utility-funded programs.
      Implements Iowa Energy Plan (2016). Iowa Energy Center Board oversees grants.
      Major data center presence: Google, Meta, Microsoft in Council Bluffs area.
      State leads in wind energy (>60% electricity mix). Universal System Benefits
      programs for efficiency. Alternative Energy Revolving Loan Program available.
      Key legislation: Iowa Code Chapter 103A (building codes), Senate File 2311 (2018).

