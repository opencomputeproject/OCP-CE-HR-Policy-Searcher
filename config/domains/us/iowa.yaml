    verified_date: "2026-01-08"
    notes: |
      Iowa Legislature bill tracking and legislation search system. 91st General Assembly 
      (2025-2027) currently in session. Key features: Bill Tracking Tools, Bill History, 
      Daily Legislation (Bill Packet), Bill Version Tracking. Energy/utilities legislation 
      typically handled by Commerce Committee. Iowa Code Chapter 476 governs utilities, 
      Chapter 476C provides renewable energy tax credits. Search keywords: "data center", 
      "energy efficiency", "utilities". Links to Iowa Code and Administrative Rules. 
      Publications section contains department-filed bills and LSA fiscal estimates.

