      - "guidance"
    verified_by: "Deep Research"
    verified_date: "2026-01-15"
    notes: |
      Official Iowa tax guidance for data center exemptions. Sales and use tax 
      exemptions require $200M minimum investment over 6 years for full exemption.
      Smaller investments ($1M+) qualify for partial refunds. HF-976 (2026) adds 
      10-15 year expiration limits on electricity exemptions and enables tenant 
      eligibility. Key statute: Iowa Code section 423.3(95).

