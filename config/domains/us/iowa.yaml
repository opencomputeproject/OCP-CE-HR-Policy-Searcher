      Official PDF versions of Iowa Administrative Code chapters via Legislature portal.
      Agency 199 (IUC): Chapters 1-45 cover electric utilities, natural gas, energy 
      efficiency (Ch 35), renewable energy, transmission siting. Agency 261 (IEDA): 
      Chapter 403 - Iowa Energy Center board and programs. Agency 661 (Public Safety): 
      Chapter 303 - State Building Code energy conservation (2009 IECC for commercial, 
      residential new construction). PDF format requires download for full text.

