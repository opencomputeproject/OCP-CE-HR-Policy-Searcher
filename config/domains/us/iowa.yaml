      Primary economic development agency for Iowa. Administers High Quality Jobs 
      Program which provides property tax exemptions for data centers (up to 60% 
      for 20 years). Iowa has attracted Meta, Google, Microsoft, Apple with 
      approximately $150M+ annually in data center tax breaks. Recent legislation 
      (Iowa Data Infrastructure Act) offers comprehensive state-level support.

