    notes: |
      Iowa's official administrative rules website. Contains proposed and adopted 
      rulemaking notices from all state agencies. Key chapters: 199 IAC (Iowa Utilities 
      Commission rules including Chapter 20 - Electric Service, Chapter 27 - Electric 
      Cooperatives and Municipal Utilities, Chapter 35 - Energy Efficiency). 
      261 IAC Chapter 403 - Iowa Energy Center rules. 661 IAC Chapter 303 - State 
      Building Code energy conservation requirements (2009 IECC). Searchable by 
      agency, keyword, or rule number. ARC numbers track rulemaking progress.

