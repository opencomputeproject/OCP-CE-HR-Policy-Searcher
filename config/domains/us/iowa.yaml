    verified_by: "Deep Research"
    verified_date: "2026-01-06"
    notes: |
      PRIORITY TARGET - One of most developed university district energy systems in the Midwest. Serves energy equivalent to 42,000 homes. Main Power Plant: 39.6 MW electricity plus steam for heating, cooling, sterilization. Path to Zero Coal by 2025 transitioning to biomass. Trigeneration plant at Oakdale serves data center and research facilities. Chilled water: 4 plants, 40,000+ tons. P3 with ENGIE/Meridiam since 2020. Excellent model for university-scale waste heat recovery.

