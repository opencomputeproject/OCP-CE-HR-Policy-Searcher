    verified_date: "2026-01-06"
    notes: |
      MISO faces major data center growth challenges—the 2023 cycle received 123 GW of interconnection requests. Implements queue cap of 50% of non-coincident peak load per study region. MTEP25 includes 435 projects supporting 11.6 GW spot load additions. Uses Expedited Project Review process for urgent large load additions outside standard MTEP cycle. Serves Iowa, Indiana (partial), Wisconsin, and parts of Montana.
