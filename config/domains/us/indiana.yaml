    verified_by: "Deep Research"
    verified_date: "2026-01-15"
    notes: |
      Indiana's primary economic development agency. Data Center Gross Retail and 
      Use Tax Exemption provides sales/use tax exemption on equipment and energy 
      for up to 25 years (<$750M investment) or 50 years (>$750M). Indiana Code 
      § 6-2.5-15 governs program. Local governments may provide additional personal 
      property tax exemptions for $25M+ investments. In 2025, IEDC approved $168M 
      in data center tax breaks for four major projects.

