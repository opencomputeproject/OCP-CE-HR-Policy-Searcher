    verified_date: "2026-01-08"
    notes: |
      Indiana's federally designated State Energy Office. Coordinates state energy
      policy with executive branch agencies. Administers DOE grant programs including
      EECBG ($2.4M allocation), Indiana Energy Efficiency Fund ($9.9M revolving loans),
      and Indiana Energy Saver Program ($182M federal funding). Five pillars policy:
      affordability, reliability, resiliency, stability, environmental sustainability.
      IURC requires utility energy efficiency plans every 3 years.
      Growing Indianapolis data center market with crossroads connectivity.

