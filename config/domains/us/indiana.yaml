    notes: |
      Indiana administrative regulations through IURC and OED portals on IN.gov. 
      IURC (Indiana Utility Regulatory Commission) publishes utility rules under 
      170 IAC (Indiana Administrative Code). OED (Office of Energy Development) 
      administers energy efficiency programs including $182M Indiana Energy Saver 
      (IRA-funded), $9.9M Energy Efficiency Fund. IURC requires utility energy 
      efficiency plans every 3 years per Indiana Code 8-1-8.5. Cross-reference 
      with IGA.in.gov for enabling legislation.

