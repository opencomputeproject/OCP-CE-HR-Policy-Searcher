      Telecommunications; Senate Utilities. Recent major legislation: HB 1007, SB 423, 
      SB 424 (2025) - small modular nuclear reactors driven by data center energy demand.
      Data center boom driving significant energy legislation - "Big Tech's voracious 
      appetite for energy" cited in legislative debates. Search bills by keyword, sponsor,
      committee. Indiana Code Title 8 (Utilities and Transportation) contains relevant 
      statutes. Legislature passed laws forcing utility customers to fund SMR development
      costs for data center power needs. JavaScript-heavy interface requires Playwright.

