    notes: |
      Montana Legislature Bill Explorer - new dedicated bill tracking application.
      Features: filter by Bill Type, Bill Status, Committee, Date Range, Party,
      Requester (legislator, agency, interest group); export to PDF/CSV; column 
      customization saved in browser. Bills listed by Bill # then LC #. View bill
      details including summaries, history, text, amendments, committee reports.
      Filters can be combined for specific searches (e.g., House bills in Judiciary
      Committee that passed). Separate from main leg.mt.gov but more user-friendly
      for bill tracking. JavaScript required for filtering functionality.

