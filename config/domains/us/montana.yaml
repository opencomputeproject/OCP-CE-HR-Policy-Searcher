      - "utilities"
      - "energy"
      - "taxation"
    policy_types:
      - "law"
    verified_by: "Deep Research"
    verified_date: "2026-01-08"
    notes: |
      Montana Code Annotated (MCA) - compiled state constitution and laws. Title 69 
      (Public Utilities): Chapter 3 - Montana Renewable Power Production and Rural 
      Economic Development Act (69-3-2001 to 69-3-2020) requiring 15% renewable by 2015,
      Universal System Benefits (USB) charge per 69-8-402. Chapter 8 - Electric Utility
      Industry Restructuring. Title 15 (Taxation): 15-24-1401 (50% property tax reduction
      for renewable >1MW, 9-year phaseout), 15-6-157 (lower property tax for renewable 
      transmission). High Performance Building Standards for state buildings per 2015
      legislature. MCA searchable by title/chapter/section. Cross-reference with 
      Administrative Rules of Montana (ARM) for implementing regulations.

