    verified_by: "Deep Research"
    verified_date: "2026-01-06"
    notes: |
      HIGHEST PRIORITY - NATIONAL MODEL FOR GEOTHERMAL DISTRICT ENERGY. Multiple geothermal districts: 264 boreholes (100 more planned), 56 miles piping, 650,000 sq ft served. Leon Johnson District (2011): 51-52 wells connecting 4 buildings. Norm Asbjornson Hall: LEED Platinum, 104 boreholes (500 ft), 70% less energy. Romney Hall: 84 boreholes (700 ft). Fifth-generation ambient loop enables building-to-building energy sharing. Central Heating Plant (1922): 3 dual-fuel boilers, 90,000 pph peak, steam turbine co-gen (~1 MW). Carbon neutral goal 2040. DOE-documented case study.

