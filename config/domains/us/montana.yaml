    verified_date: "2026-01-08"
    notes: |
      Montana Legislature official site - 2025 Regular Session. Legislature meets 
      biennially for 90 working days in odd years. New Bill Explorer application 
      (bills.legmt.gov) with powerful filtering by session, status, date range, 
      committee, party, requester. Bill Tracker feature with Preference Lists and 
      Notifications. Key interim committee: Energy and Telecommunications Interim 
      Committee (ETIC) - oversees PSC and DPSR, issues biennial reports on electricity
      loads, renewable energy implementation, climate change effects per MCA 5-5-230.
      ETIC materials include USB (Universal System Benefits) annual reports, PSC 
      rule memos, renewable energy studies. Montana Code Annotated Title 69 
      (Public Utilities) available. Public participation via legmt.gov/participate 
      (requires verified Montana address).

