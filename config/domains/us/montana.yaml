    verified_by: "Deep Research"
    verified_date: "2026-01-15"
    notes: |
      Montana has NO specific data center tax incentives but offers general 
      business programs. Montana has NO state sales tax (beneficial for equipment
      purchases). Available incentives: Job Growth Incentive Tax Credit (JGTC) 
      for high-paying jobs ($50K+), Montana Growth Fund loans, CDBG Economic 
      Development grants. No gross receipts tax, no state inventory tax. 
      Research and development firms exempt from state corporate income tax 
      for first 5 years if domiciled in Montana for first time.

