      - "planning"
    policy_types:
      - "guidance"
      - "incentive"
      - "grant_program"
      - "report"
    verified_by: "Deep Research"
    verified_date: "2026-01-08"
    notes: |
      Energy Bureau serves as Montana's State Energy Office within DEQ's Air,
      Energy and Mining Division. Two sections: Energy Efficiency & Compliance
      Assistance, and Energy Planning. Administers BIL/IRA funding including
      Grid Resilience Grants, EECBG, Home Energy Rebates Program.
      Universal System Benefits (USB) Charge per Mont. Code 69-8-402 funds
      efficiency programs through NorthWestern Energy and Montana-Dakota Utilities.
      Alternative Energy Revolving Loan Program available. Montana emerging as
      data center market with hydropower and cold climate advantages.
      Contact: 406-444-0281 or TDEC.OEP@mt.gov.

