    requires_playwright: false
    rate_limit_seconds: 2.0
    category: "energy_ministry"
    tags:
      - "reporting"
      - "efficiency"
    policy_types:
      - "regulation"
    verified_by: "Deep Research"
    verified_date: "2026-02-03"
    notes: |
      AB 802 requires annual benchmarking for commercial buildings >50,000 ft².
      Uses ENERGY STAR Portfolio Manager. Affects large data centers.
      Public disclosure of building energy performance.
      Penalties: $500-$2,000 per category per day for non-compliance.
      - Commercial buildings: reporting since 2018
      - Multi-family (17+ units): reporting since 2019
      - Report due June 1 annually
      - Exemptions for cities with local ordinances (LA, SF, SD, SJ)

