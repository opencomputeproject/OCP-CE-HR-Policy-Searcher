    verified_date: "2026-02-03"
    notes: |
      CARB regulates backup generators for DCs. Stricter than EPA standards.
      35 local air districts enforce permitting. Large generators (>50 hp)
      require permits. PSPS allowances for emergency operation.
      - CO, NOx, SOx, particulate standards
      - Different rules during Public Safety Power Shutoffs
      - Local air district permits required

