    verified_by: "Deep Research"
    verified_date: "2026-02-03"
    notes: |
      SGIP provides financial incentives for waste heat to power, CHP, fuel cells,
      energy storage. $813.4M authorized 2020-2024. Eligible technologies include
      pressure reduction turbines, microturbines, gas turbines.
      Primary state incentive mechanism for DC waste heat utilization.
      - Administered by PG&E, SCE, SoCalGas, SDG&E/CSE
      - Incentive rates: $150-$1,100/kWh for storage; tiered for generation
      - Program continues through 2025+

