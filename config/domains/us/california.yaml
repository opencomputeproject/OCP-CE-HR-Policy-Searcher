    notes: |
      CAISO manages grid interconnection for DCs. 18.7 GW of DC service capacity
      requested statewide. Cluster 15 processed 541 applications (347 GW).
      Average 9.2 years in queue. Interconnection reform ongoing (2024-2025).
      - Load interconnections governed by utility tariffs
      - 2022 MOU links CEC-CPUC-CAISO planning
      - $4.8B transmission upgrades in 2024-2025 plan

