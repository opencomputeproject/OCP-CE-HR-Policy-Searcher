  - name: "CEC Building Energy Efficiency Standards"
    id: "cec_title24"
    enabled: true
    base_url: "https://www.energy.ca.gov"
    start_paths:
      - "/programs-and-topics/programs/building-energy-efficiency-standards"
      - "/programs-and-topics/programs/building-energy-efficiency-standards/2025-building-energy-efficiency"
