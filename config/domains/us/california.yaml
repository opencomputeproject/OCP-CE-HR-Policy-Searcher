    requires_playwright: false
    rate_limit_seconds: 2.0
    category: "standards"
    tags:
      - "mandates"
      - "efficiency"
    policy_types:
      - "standard"
      - "regulation"
    verified_by: "Deep Research"
    verified_date: "2026-02-03"
    notes: |
      Title 24 Part 6 Section 120.6(j) & 140.9(a) contain mandatory requirements
      for computer rooms >20 W/ft² ITE load. Includes economizer requirements,
      air containment mandates, UPS efficiency standards, fan power limits.
      2022 code updates significantly tightened data center requirements.
      - Section 120.6(j): Mandatory requirements
      - Section 140.9(a): Prescriptive requirements
      - Economizer: air 55°F DB/50°F WB; water 40°F DB/35°F WB
      - Air containment required for rooms >10 kW ITE design load
      - Healthcare facilities exempt from computer room requirements

