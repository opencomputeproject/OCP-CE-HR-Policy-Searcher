# =============================================================================
# ILLINOIS (IL)
# =============================================================================
# State abbreviation: IL
# Region: us, us_states
# =============================================================================

domains:
  - name: "Illinois Commerce Commission"
    id: "il_icc"
    enabled: true
    region:
      - "us"
      - "us_states"
      - "illinois"
    base_url: "https://www.icc.illinois.gov"
    start_paths:
      - "/electricity"
      - "/energy"
    max_depth: 2
    language: "en"
    requires_playwright: false
    rate_limit_seconds: 2.0
    category: "regulatory"
    tags:
      - "planning"
      - "efficiency"
    policy_types:
      - "regulation"
    notes: |
      4th largest data center market nationally.
      Chicago Quantum & Microelectronics Park: closed-loop wastewater system.
      Meta's 1.1 GW nuclear purchase agreement at Clinton facility.

  - name: "Illinois General Assembly - Legislation"
    id: "il_legislature"
    enabled: true
    region:
      - "us"
      - "us_states"
      - "illinois"
    base_url: "https://www.ilga.gov"
    start_paths:
      - "/legislation/"
    allowed_path_patterns:
      - "/legislation/*"
    max_depth: 2
    language: "en"
    requires_playwright: false
    rate_limit_seconds: 2.0
    category: "legislative"
    tags:
      - "mandates"
      - "efficiency"
    policy_types:
      - "law"
    notes: |
      Added 2026-07-07 from recall/coverage audit: IL is the 4th largest data
      center market with no legislature bill-search coverage (only the ICC).
      Legislation portal for tracking energy and data center bills.

