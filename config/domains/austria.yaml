domains:
  - name: "Austrian Ministry for Climate Action"
    id: "bmk_at"
    enabled: true
    region:
      - "eu"
      - "eu_central"
    base_url: "https://www.bmk.gv.at"
    start_paths:
      - "/en/topics/energy"
