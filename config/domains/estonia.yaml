# ESTONIA
# =============================================================================
# Added 2026-07-07 from recall/coverage audit: EU member bound by EED
# Article 26 waste-heat rules; previously zero configured sources.
# NOTE: keywords.yaml has no Estonian (et) terms yet — Riigi Teataja search
# seeds carry discovery until Estonian keyword coverage is added.
