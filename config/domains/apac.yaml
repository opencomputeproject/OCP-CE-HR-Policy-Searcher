# =============================================================================
# ASIA-PACIFIC REGION
# =============================================================================
# Energy agencies in Singapore, Japan, South Korea, Australia, and other APAC
# =============================================================================

domains:
  - name: "Singapore IMDA - Green Data Centre Programme"
    id: "imda_sg"
    enabled: true
    region:
      - "apac"
    base_url: "https://www.imda.gov.sg"
    start_paths:
      - "/how-we-can-help/green-data-centre-programme"
    max_depth: 2
    language: "en"
    requires_playwright: false
    rate_limit_seconds: 2.0
    category: "standards"
    tags:
      - "efficiency"
      - "mandates"
    policy_types:
      - "standard"
      - "guidance"
    notes: "Green Data Centre Roadmap launched May 2025, PUE ≤1.3"

  - name: "Singapore Energy Market Authority"
    id: "ema_sg"
    enabled: true
    region:
      - "apac"
    base_url: "https://www.ema.gov.sg"
    start_paths:
      - "/energy-transformation"
    max_depth: 2
    language: "en"
    requires_playwright: false
    rate_limit_seconds: 2.0
    category: "regulatory"
    tags:
      - "efficiency"
      - "carbon"
    policy_types:
      - "regulation"
      - "guidance"
    notes: "Energy efficiency standards"

  - name: "Japan METI - Ministry of Economy, Trade and Industry"
    id: "meti_jp"
    enabled: true
    region:
      - "apac"
    base_url: "https://www.meti.go.jp"
    start_paths:
      - "/english/policy/energy_environment/green_growth"
    max_depth: 2
    language: "en"
    requires_playwright: false
    rate_limit_seconds: 2.0
    category: "energy_ministry"
    tags:
      - "carbon"
      - "efficiency"
      - "incentives"
    policy_types:
      - "law"
      - "regulation"
      - "incentive"
    notes: "Green Transformation (GX) initiative, carbon neutrality by 2050"

  - name: "Japan Agency for Natural Resources and Energy"
    id: "enecho_jp"
    enabled: true
    region:
      - "apac"
    base_url: "https://www.enecho.meti.go.jp"
    start_paths:
      - "/en/category/saving_and_new"
    max_depth: 2
    language: "ja"
    requires_playwright: false
    rate_limit_seconds: 2.0
    category: "energy_ministry"
    tags:
      - "efficiency"
      - "research"
    policy_types:
      - "regulation"
      - "guidance"
      - "report"
    notes: "Energy conservation programs"

  - name: "South Korea MOTIE - Ministry of Trade, Industry and Energy"
    id: "motie_kr"
    enabled: true
    region:
      - "apac"
    base_url: "https://www.motie.go.kr"
    start_paths:
      - "/www/main.do"
    max_depth: 2
    language: "ko"
    requires_playwright: false
    rate_limit_seconds: 2.0
    category: "energy_ministry"
    tags:
      - "efficiency"
      - "carbon"
    policy_types:
      - "regulation"
      - "standard"
    notes: "PUE thresholds for carbon reduction"

  - name: "Australia Department of Climate Change, Energy"
    id: "energy_au"
    enabled: true
    region:
      - "apac"
    base_url: "https://www.energy.gov.au"
    start_paths:
      - "/business/energy-management"
    max_depth: 2
    language: "en"
    requires_playwright: false
    rate_limit_seconds: 2.0
    category: "energy_ministry"
    tags:
      - "efficiency"
      - "reporting"
    policy_types:
      - "regulation"
      - "guidance"
    notes: "Growing APAC data center market"
