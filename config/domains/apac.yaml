domains:
  - name: "Singapore IMDA - Green Data Centre Programme"
    id: "imda_sg"
    enabled: true
    region:
      - "apac"
      - "singapore"
    base_url: "https://www.imda.gov.sg"
    start_paths:
      - "/how-we-can-help/green-data-centre-programme"
      - "/how-we-can-help/green-dc-roadmap"
      - "/-/media/imda/files/how-we-can-help/green-dc-roadmap/green-dc-roadmap.pdf"
      - "/how-we-can-help/green-dc-roadmap/tropical-dc-standard"
    max_depth: 2
    language: "en"
    requires_playwright: false
    rate_limit_seconds: 2.0
    category: "policy"
    tags:
      - "mandatory"
      - "pue_limits"
      - "wue"
      - "green_mark"
      - "dc_cfa"
    policy_types:
      - "energy_efficiency"
      - "building_codes"
    verified_by: "Deep Research"
    verified_date: "2026-02-03"
    notes: |
      Singapore Green Data Centre Roadmap (official PDF).
      All DCs to achieve PUE <=1.3 at 100% IT load within 10 years.
      WUE target 2.0 m3/MWh.
      DC-CFA participants must achieve Green Mark DC Platinum certification.
      SS 697:2023 Tropical Data Centre Standard: world's first tropical DC standard.
      Guidelines for operating at higher temperatures (up to 35C).
      2-5% cooling energy savings per 1C temperature increase.

  - name: "Singapore BCA-IMDA Green Mark for Data Centres 2024"
    id: "bca_sg_greenmark"
    enabled: true
    region:
      - "apac"
      - "singapore"
    base_url: "https://www1.bca.gov.sg"
    start_paths:
      - "/docs/default-source/docs-corp-buildsg/sustainability/20241008_gmdc2024_ver1.pdf"
    max_depth: 1
    language: "en"
    requires_playwright: false
    rate_limit_seconds: 2.0
    category: "standards"
    tags:
      - "certification"
      - "pue_measurement"
      - "cooling_efficiency"
      - "district_cooling"
    policy_types:
      - "building_codes"
      - "energy_efficiency"
    verified_by: "Deep Research"
    verified_date: "2026-02-03"
    notes: |
      Green Mark for Data Centres 2024 (GMDC:2024) certification scheme.
      PUE measurement at 25%, 50%, 75%, 100% IT load.
      Cooling system efficiency <=0.65-0.70 kW/RT for district cooling.
      Includes water efficiency and sustainable construction criteria.
      Required for DC-CFA applicants.

