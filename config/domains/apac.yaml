      Energy Efficiency Act Data Center Benchmark System.
      PUE benchmark target <=1.4 by 2030.
      Mandatory reporting for DCs with annual energy use >=1,500 kL crude oil equivalent (~16,000 MWh).
      Measurement per JDCC PUE Guidelines.
      Key regulation for Japanese data center market.

