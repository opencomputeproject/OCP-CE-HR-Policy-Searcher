    language: "en"
    requires_playwright: false
    rate_limit_seconds: 2.0
    category: "legislation"
    tags:
      - "mandates"
      - "reporting"
    policy_types:
      - "regulation"
    notes: |
      CONFIRMED WORKING - EU data center sustainability rating scheme.
      Sets KPIs: energy consumption, water usage, WASTE HEAT UTILIZATION.
      Reporting deadline: 15 May annually.
      500kW+ installed IT power threshold.

  - name: "EU Commission Recommendation 2024/2395 - Article 26 Guidelines"
    id: "eurlex_eed_recommendation"
    enabled: true
    region:
      - "eu"
    base_url: "https://eur-lex.europa.eu"
    start_paths:
      - "/eli/reco/2024/2395/oj/eng"
    allowed_path_patterns:
      - "/eli/reco/2024/*"
      - "/legal-content/EN/*2024/2395*"
    max_depth: 1
    language: "en"
    requires_playwright: false
    rate_limit_seconds: 2.0
    category: "guidance"
    tags:
      - "guidance"
      - "article_26"
      - "cost_benefit_analysis"
      - "interpretation"
    policy_types:
      - "guidance"
      - "waste_heat_recovery"
    verified_by: "Deep Research"
    verified_date: "2026-02-03"
    notes: |
      Official interpretation guidelines for EED Article 26(6).
      Clarifies requirement applies to ALL operating DCs >1MW without current waste heat use.
      Cost-benefit analysis mandatory where no recovery exists.
      Waste heat treated as revenue-generating energy product.

