# EU - CONFIRMED DATA CENTER DIRECTIVE & REPORTING SCHEME
# =============================================================================

  - name: "EUR-Lex Energy Efficiency Directive 2023/1791"
    id: "eurlex_eed_2023"
    enabled: true
    region:
      - "eu"
    base_url: "https://eur-lex.europa.eu"
    start_paths:
      - "/eli/dir/2023/1791/oj/eng"
      - "/legal-content/EN/TXT/HTML/?uri=CELEX:32023L1791"
      - "/EN/legal-content/summary/energy-efficiency-from-2025.html"
    allowed_path_patterns:
      - "/eli/dir/2023/*"
      - "/legal-content/EN/*32023L1791*"
    max_depth: 1
    language: "en"
    requires_playwright: false
    rate_limit_seconds: 2.0
    category: "legislation"
    tags:
      - "mandates"
      - "reporting"
      - "efficiency"
    policy_types:
      - "directive"
      - "law"
    notes: |
      CONFIRMED WORKING - EU Energy Efficiency Directive (recast).
      Article 12: Data center reporting obligations (500kW+ facilities).
      Article 26.6: Waste heat utilization requirements (1MW+ facilities).
      Annex VII: Reporting information requirements.
      Transposition deadline: October 2025.

  - name: "EUR-Lex Data Centre Delegated Regulation 2024/1364"
    id: "eurlex_dc_regulation"
    enabled: true
    region:
      - "eu"
    base_url: "https://eur-lex.europa.eu"
    start_paths:
      - "/eli/reg_del/2024/1364/oj/eng"
