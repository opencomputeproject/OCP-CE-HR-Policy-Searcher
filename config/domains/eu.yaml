# =============================================================================
# EUROPEAN UNION DOMAINS
# =============================================================================
# EU institutions and member state energy agencies
#
# To add a domain: Copy an entry, update fields, test with --domains test
# =============================================================================

domains:
  - name: "European Commission - Energy"
    id: "ec_europa_energy"
    enabled: true
    region:
      - "eu"
    base_url: "https://energy.ec.europa.eu"
    start_paths:
      - "/topics/energy-efficiency"
      - "/topics/energy-efficiency/energy-efficiency-targets-directive-and-rules"
      - "/news"
    allowed_path_patterns:
      - "/topics/*"
      - "/news/*"
    blocked_path_patterns:
      - "/system/files/*"
    max_depth: 3
    language: "en"
    requires_playwright: false
    rate_limit_seconds: 2.0
    category: "energy_ministry"
    tags:
      - "mandates"
      - "efficiency"
      - "reporting"
    policy_types:
      - "directive"
      - "regulation"
      - "guidance"
    verified_by: "OCP Heat Reuse Group"
    verified_date: "2024-10-31"
    notes: |
      EU Energy Efficiency Directive and related policies.

  - name: "EUR-Lex (EU Law)"
    id: "eur_lex"
    enabled: true
    region:
      - "eu"
    base_url: "https://eur-lex.europa.eu"
    start_paths:
      - "/search.html?scope=EURLEX&text=data+center+energy"
      - "/legal-content/EN/TXT/?uri=CELEX:32023L1791"
    allowed_path_patterns:
      - "/legal-content/*"
    max_depth: 2
    language: "en"
    requires_playwright: true
    rate_limit_seconds: 3.0
    category: "legislative"
    tags:
      - "mandates"
    policy_types:
      - "law"
      - "directive"
      - "regulation"
    notes: "Official EU legislation database"

  - name: "Dutch Government - RVO"
    id: "rvo_nl"
    enabled: true
    region:
      - "eu"
      - "netherlands"
    base_url: "https://www.rvo.nl"
    start_paths:
      - "/onderwerpen/duurzaam-ondernemen/energie-besparen"
      - "/onderwerpen/energiebesparingsplicht/over-de-energiebesparingplicht"
      - "/onderwerpen/energie-besparen-de-industrie/datacenters"
      - "/onderwerpen/energiebesparingsplicht/eed-auditplicht/rapportageplicht-datacentra"
    allowed_path_patterns:
      - "/onderwerpen/energiebesparingsplicht/*"
      - "/onderwerpen/energie-besparen*"
      - "/onderwerpen/duurzaam-ondernemen/*"
    max_depth: 2
    language: "nl"
    requires_playwright: false
    rate_limit_seconds: 2.0
    category: "regulation"
    tags:
      - "mandatory"
      - "energy_efficiency"
      - "payback_period"
      - "reporting"
      - "recognized_measures"
      - "waste_heat"
    policy_types:
      - "energy_efficiency"
      - "waste_heat_recovery"
      - "reporting_requirements"
      - "guidance"
    verified_by: "Deep Research"
    verified_date: "2026-02-03"
    notes: |
      Netherlands Enterprise Agency - Energiebesparingsplicht (Energy Saving Obligation).
      Companies using >=50,000 kWh must implement all measures with <=5yr payback.
      Report measures every 4 years. Expanded requirements from 2023.
      Recognized data center measures (Erkende Maatregelenlijst): FD1-FD3 plus six for server rooms.
      Includes: power management, efficient cooling, waste heat recovery.
      DCs >=500kW IT capacity must report annually by May 15 (EU EED Article 12).
      Data forwarded to European Commission.



