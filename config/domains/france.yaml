# =============================================================================
# FRANCE
# =============================================================================

domains:
  - name: "French Ministry for Ecological Transition"
    id: "ecologie_fr"
    enabled: true
    region:
      - "eu"
      - "eu_central"
      - "france"
    base_url: "https://www.ecologie.gouv.fr"
    start_paths:
      - "/energie"
    max_depth: 2
    language: "fr"
    requires_playwright: false
    rate_limit_seconds: 2.0
    category: "energy_ministry"
    tags:
      - "mandates"
      - "carbon"
    policy_types:
      - "law"
      - "regulation"
    notes: "French energy policy and regulations"

  - name: "ADEME - French Environment and Energy Management Agency"
    id: "ademe_fr"
    enabled: true
    region:
      - "eu"
      - "eu_central"
      - "france"
    base_url: "https://www.ademe.fr"
    start_paths:
      - "/expertises/energies-renouvelables-enr-production-reseaux-stockage"
    max_depth: 2
    language: "fr"
    requires_playwright: false
    rate_limit_seconds: 2.0
    category: "environmental_agency"
    tags:
      - "incentives"
      - "efficiency"
      - "research"
    policy_types:
      - "incentive"
      - "guidance"
      - "report"
    notes: "Waste heat recovery subsidies and programs"

  - name: "France Code de l'energie - Data Center Energy Performance"
    id: "legifrance_dc"
    enabled: true
    region:
      - "eu"
      - "france"
    base_url: "https://www.legifrance.gouv.fr"
    start_paths:
      - "/codes/id/LEGISCTA000051560830"
      - "/codes/section_lc/LEGITEXT000023983208/LEGISCTA000051560830"
    allowed_path_patterns:
      - "/codes/id/*"
      - "/codes/article_lc/*"
      - "/codes/section_lc/*"
    max_depth: 2
    language: "fr"
    requires_playwright: true
    rate_limit_seconds: 3.0
    category: "legislation"
    tags:
      - "mandatory"
      - "waste_heat"
      - "reporting"
      - "cost_benefit_analysis"
    policy_types:
      - "legislation"
      - "energy_efficiency"
      - "waste_heat_recovery"
      - "reporting_requirements"
    verified_by: "Deep Research"
    verified_date: "2026-02-03"
    notes: |
      French Energy Code Chapter VI: Data Center Energy Performance (L236-1 to L236-3).
      L236-1: DCs >=500kW must report to EU platform.
      L236-2: DCs >=1MW must install waste heat recovery systems.
      L236-3: Mandatory cost-benefit analysis for efficiency improvements.
      Effective October 1, 2025.

  - name: "Legifrance - Waste Heat Legislation Search"
    id: "legifrance_search"
    enabled: true
    region:
      - "eu"
      - "eu_central"
      - "france"
    base_url: "https://www.legifrance.gouv.fr"
    start_paths:
      - "/search/code?tab_selection=code&searchField=ALL&query=chaleur+fatale"
      - "/search/lois?tab_selection=lois&searchField=ALL&query=valorisation+chaleur"
    allowed_path_patterns:
      - "/search/*"
      - "/codes/*"
      - "/loda/*"
      - "/jorf/*"
    max_depth: 2
    language: "fr"
    requires_playwright: true
    rate_limit_seconds: 3.0
    category: "legislation"
    tags:
      - "waste_heat"
      - "mandates"
    policy_types:
      - "law"
      - "legislation"
    notes: |
      Added 2026-07-07 from recall/coverage audit: Legifrance full-text search
      seeds for "chaleur fatale" (waste heat) and "valorisation chaleur".
      Complements the fixed Code de l'energie sections in legifrance_dc by
      surfacing new laws and decrees as they are published.
