# =============================================================================
# GERMANY - CONFIRMED DATA CENTER HEAT REUSE LAW (EnEfG)
# =============================================================================
# Germany's 2023 Energy Efficiency Act has MANDATORY heat reuse requirements
# for data centers. This is the strongest validation target.
# =============================================================================

domains:
  - name: "Germany Federal Law Database - EnEfG"
    id: "gesetze_enefg"
    enabled: true
    region:
      - "eu"
      - "eu_central"
    base_url: "https://www.gesetze-im-internet.de"
    start_paths:
      - "/enefg/"
      - "/enefg/__11.html"  # Climate-neutral data centers requirements
      - "/enefg/__12.html"  # Energy management systems
      - "/enefg/__13.html"  # Information disclosure requirements
      - "/enefg/__14.html"  # Energy efficiency registry
      - "/enefg/__16.html"  # Vermeidung und Verwendung von Abwärme (waste heat avoidance/use)
      - "/enefg/__17.html"  # Plattform für Abwärme (waste heat platform/reporting)
      - "/enefg/BJNR1350B0023.html"  # Complete EnEfG law text
      - "/enefg/anlage_3.html"  # Reporting requirements annex
    allowed_path_patterns:
      - "/enefg/*"
    max_depth: 2
    language: "de"
    requires_playwright: false
    rate_limit_seconds: 2.0
    category: "legislation"
    tags:
      - "mandatory"
      - "waste_heat"
      - "pue_limits"
      - "renewable_energy"
      - "data_center_specific"
      - "reporting"
    policy_types:
      - "legislation"
      - "energy_efficiency"
      - "waste_heat_recovery"
      - "reporting_requirements"
    verified_by: "Deep Research"
    verified_date: "2026-02-03"
    notes: |
      CONFIRMED WORKING - German Energy Efficiency Act (EnEfG) 2023.
      §11: Mandatory waste heat reuse targets: 10% ERF from July 2026, 15% from July 2027, 20% from July 2028.
      PUE limits: <=1.2 for new DCs, <=1.3 by 2030 for existing. 100% renewable electricity from 2027.
      Applies to data centers >=300kW.
      §12: mandates energy/environmental management systems.
      §13: requires annual public reporting of energy performance.
      §14: establishes national energy efficiency registry.
      §16: Waste heat avoidance and utilization - must use state-of-the-art technology, cascade-style utilization.
      §17: Waste heat platform - must provide data to heat network operators on request, annual submission to BfEE by March 31.
      Complete law text covers penalties up to 100,000 EUR.
      Keywords: Rechenzentren, wiederverwendeter Energie, Abwärme, Energieeffizienz

