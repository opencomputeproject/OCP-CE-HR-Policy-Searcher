# =============================================================================
# DOMAIN TEMPLATE
# =============================================================================
# Copy this template to add new domains. Save as a new file or add to an
# existing regional file.
#
# Required fields: name, id, base_url, start_paths
# Optional fields: all others (defaults from settings.yaml apply)
# =============================================================================

domains:
  - name: "Full Organization Name"         # Human-readable name
    id: "short_id"                          # Unique ID (lowercase, underscores)
    enabled: true                           # Set to false to disable temporarily
    base_url: "https://www.example.gov"     # Root URL (no trailing slash)
    start_paths:                            # Pages to start crawling from
      - "/energy/policies"
      - "/programs/efficiency"

    # Optional: URL patterns to include/exclude
    allowed_path_patterns:                  # Only follow links matching these
      - "/energy/*"
      - "/policies/*"
    blocked_path_patterns:                  # Never follow links matching these
      - "/downloads/*"
      - "/videos/*"

    # Optional: Crawl settings (defaults from settings.yaml if not specified)
    max_depth: 2                            # How many link levels to follow
    max_pages: 50                           # Max pages for this domain (default: global max_pages_per_domain)
    min_keyword_score: 5.0                  # Keyword score threshold override (default: global minimum_keyword_score)
    language: "en"                          # Primary language (en, de, fr, etc.)
    requires_playwright: false              # Set true for JavaScript-heavy sites
    rate_limit_seconds: 2.0                 # Delay between requests

    # -------------------------------------------------------------------------
    # CATEGORIZATION (for filtering with --category, --tag, --policy-type)
    # -------------------------------------------------------------------------
    #
    # category: Primary classification (pick ONE)
    #   energy_ministry      - National/state energy departments
    #   environmental_agency - EPA equivalents, climate agencies
    #   legislative          - Bill trackers, law databases, parliaments
    #   district_heating     - Heat network authorities
    #   grid_operator        - RTOs, ISOs, grid planners
    #   economic_dev         - Business incentives, tax programs
    #   regulatory           - Utility commissions, permit authorities
    #   standards            - Building codes, efficiency standards
    #
    # tags: Multiple labels (pick any that apply)
    #   incentives  - Grants, tax breaks, subsidies
    #   mandates    - Required regulations
    #   reporting   - Disclosure requirements
    #   carbon      - Carbon pricing, credits, emissions
    #   efficiency  - PUE, energy efficiency programs
    #   planning    - Zoning, permits, infrastructure
    #   research    - Studies, reports, data
    #
    # policy_types: What kinds of policies this site publishes
    #   law         - Enacted legislation
    #   regulation  - Agency rules
    #   directive   - EU directives, guidance with force
    #   incentive   - Grant programs, tax credits
    #   guidance    - Best practices, recommendations
    #   standard    - Technical standards, building codes
    #   report      - Research, data, analysis
    # -------------------------------------------------------------------------

    # -------------------------------------------------------------------------
    # REGION (for geographic grouping with --domains)
    # -------------------------------------------------------------------------
    # region: Geographic region(s) this domain belongs to (list)
    #   eu          - European Union institutions and member states
    #   nordic      - Nordic countries (Sweden, Denmark, Finland, Norway, Iceland)
    #   eu_central  - Germany, Switzerland, Austria, France
    #   eu_west     - Netherlands, Belgium, Ireland
    #   uk          - United Kingdom (England, Scotland, Wales, Northern Ireland)
    #   us          - United States (federal and state)
    #   us_states   - US state governments specifically
    #   apac        - Asia-Pacific region
    # -------------------------------------------------------------------------

    region:                                 # Geographic regions (see list above)
      - "eu"

    category: "energy_ministry"             # Primary category (see list above)
    tags:                                   # Multiple tags for filtering
      - "efficiency"
      - "mandates"
    policy_types:                           # Types of policies found here
      - "regulation"
      - "guidance"

    # Optional: Documentation
    verified_by: "Your Name"                # Who verified this domain
    verified_date: "2026-01-05"             # When it was verified
    notes: |                                # Any useful context
      Brief description of what policies are found here.
      Mention specific laws or programs if known.
