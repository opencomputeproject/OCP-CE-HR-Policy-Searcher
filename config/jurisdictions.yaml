# Jurisdiction registry - canonical answer to 'what jurisdiction is
# this, what is its ISO code, what does it roll up to'.
#
# One row per jurisdiction. Adding a new source's region = add one row
# here, not vocabulary across config.py / verifier.py / tools.py.
#
# kind: country | us_state | subnational | supranational | group
# iso3 / iso_numeric: countries only (iso_numeric is the world-atlas map key).
# code: ISO 3166-2 for us_state / subnational (e.g. US-MN, DE-HE).
# parent: slug this rolls up to (us_state/subnational -> country).
# members: group/supranational only.
# aliases: lowercase strings that resolve here (LLM free text, other langs).

