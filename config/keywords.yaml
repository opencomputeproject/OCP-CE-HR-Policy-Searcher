# =============================================================================
# KEYWORD CONFIGURATION
# =============================================================================
# Keywords used to identify relevant policy content.
# Organized by category with weights for scoring.
#
# Scoring formula:
#   score = sum(category_weight * match_count) for each category
#
# A page is considered relevant if:
#   - score >= thresholds.minimum_keyword_score AND
#   - total unique matches >= thresholds.minimum_matches
# =============================================================================

