        - "κατανάλωση ενέργειας"
        - "βιωσιμότητα"

      hu:
        - "energiahatékonyság"
        - "energiafogyasztás"
        - "fenntarthatóság"
        - "dekarbonizáció"

      ro:
        - "eficiență energetică"
        - "consum de energie"
        - "sustenabilitate"
        - "decarbonizare"

# =============================================================================
# THRESHOLDS
# =============================================================================

thresholds:
  # Minimum weighted score to consider a page relevant
  # With weights: subject=3, policy=2, incentive=2, enabling=1.5, off_takers=1.5, context=1, energy=1
  # Score of 5.0 means roughly:
  #   - 2 subject matches, OR
  #   - 1 subject + 1 policy match, OR
  #   - 2 policy + 1 context matches
  minimum_keyword_score: 5.0

  # Must have at least this many different keyword matches
  # Prevents false positives from a single repeated word
  minimum_matches: 2

  # Pages below this LLM relevance score are filtered out
  minimum_llm_relevance: 5

# =============================================================================
# URL-BASED SCORING BONUSES
# =============================================================================
# Bonus points added to a page's keyword score based on URL patterns.
# Helps surface legislative and government content that may have terse text.
#
# Three bonus types (stackable):
#   1. Government TLD bonus: URL hostname matches a government domain suffix
#   2. Legislation path bonus: URL path matches a legislative path pattern
#   3. Bill number bonus: URL contains a bill/act number (e.g., HB323, SB192)
# =============================================================================

url_bonuses:
  # -------------------------------------------------------------------------
  # Government TLD patterns
  # -------------------------------------------------------------------------
  # Bonus applied when hostname ends with one of these suffixes.
  # Covers US (.gov), UK (.gov.uk), and international government domains.
  gov_tld_bonus: 1.0
  gov_tld_patterns:
    # US / UK
    - ".gov"
    - ".gov.uk"
    - ".state.us"
    # Europe
    - ".gouv.fr"          # France
    - ".gv.at"            # Austria
    - ".admin.ch"         # Switzerland federal
    - ".europa.eu"        # EU institutions
    # Nordic
    - ".riksdagen.se"     # Swedish parliament
    - ".retsinformation.dk"  # Danish law database
    - ".regjeringen.no"   # Norwegian government
    - ".lovdata.no"       # Norwegian law database
    - ".energimyndigheten.se"  # Swedish Energy Agency
    - ".enova.no"         # Norwegian energy efficiency
    - ".energiavirasto.fi"  # Finnish Energy Authority
    - ".tem.fi"           # Finnish Ministry
    - ".orkustofnun.is"   # Icelandic Energy Authority
    # Asia-Pacific
    - ".go.jp"            # Japan
    - ".go.kr"            # South Korea
    - ".gov.sg"           # Singapore
    - ".gov.au"           # Australia
    # Southern/Eastern Europe
    - ".gob.es"           # Spain
    - ".gov.it"           # Italy
    - ".gov.pl"           # Poland
    - ".gov.pt"           # Portugal
    - ".gov.cz"           # Czech Republic
    - ".gov.gr"           # Greece
    - ".gov.hu"           # Hungary
    - ".gov.ro"           # Romania

    # External legislation databases
    - ".boe.es"           # Spain - Official State Gazette
    - ".normattiva.it"    # Italy - Consolidated legislation
    - ".sejm.gov.pl"      # Poland - ISAP legislation database
    - ".dre.pt"           # Portugal - Diário da República
    - ".zakonyprolidi.cz" # Czech Republic - Laws for people
    - ".et.gr"            # Greece - National Printing Office
    - ".njt.hu"           # Hungary - National legislation
    - ".monitoruloficial.ro" # Romania - Official Gazette
    - ".kormany.hu"       # Hungary - Government portal
    - ".iea.org"          # International Energy Agency

  # -------------------------------------------------------------------------
  # Legislation path patterns (regex)
  # -------------------------------------------------------------------------
  # Bonus applied when URL path matches any of these patterns.
  # Only counted once even if multiple patterns match.
  bill_path_bonus: 1.5
  bill_path_patterns:
    # English
    - "/bill[s]?[-/]"
    - "/legislation/"
    - "/act[s]?/"
    - "/statute[s]?/"
    - "/measure[s]?/"
    - "/resolution[s]?/"
    # German
    - "/gesetze/"
    - "/verordnung/"
    - "/regelung/"
    # French
    - "/lois/"
    - "/decrets/"
    # EU
    - "/legal-content/"
    - "/celex/"
    # Nordic legislation paths
    - "/dokument/"        # Norwegian lovdata, Swedish riksdagen
    - "/forskrift/"       # Norwegian regulations
    - "/eli/"             # Danish retsinformation
    - "/svensk-forfattningssamling/"  # Swedish law collection
    # US state-specific paths
    - "/legp\\d+\\.exe"
    - "/BillStatus/"
    - "/docket/"
    - "/rulemaking/"

  # -------------------------------------------------------------------------
  # Bill number pattern (regex)
  # -------------------------------------------------------------------------
  # Bonus applied when URL contains a legislative bill identifier.
  # Pattern matches bill prefixes followed by numbers in path or query string.
  bill_number_bonus: 1.0
  bill_number_pattern: "[/=](H\\.?B\\.?|S\\.?B\\.?|H\\.?R\\.?|S\\.?R\\.?|H\\.?J\\.?R\\.?|S\\.?J\\.?R\\.?|H\\.?F\\.?|S\\.?F\\.?|A\\.?B\\.?|L\\.?D\\.?)\\s*\\d+"

# =============================================================================
# NEGATIVE KEYWORDS (EXCLUSIONS)
# =============================================================================
# Pages containing these are likely not relevant

exclusions:
  # Job postings and careers
  - "job opening"
  - "career opportunity"
  - "we are hiring"
  - "apply now"
  - "position available"
  - "employment opportunity"

  # News about unrelated topics
  - "press release archive"
  - "newsletter signup"

  # Generic pages
  - "cookie policy"
  - "privacy policy"
  - "terms of service"
  - "contact us"
  - "site map"
  - "sitemap"

# =============================================================================
# STRICTER KEYWORD REQUIREMENTS (Phase 2)
# =============================================================================
# These settings provide additional filtering beyond basic keyword matching.
# Use these to reduce false positives and save LLM API costs.
#
# HOW IT WORKS:
# 1. Basic keyword matching (score + matches) runs first
# 2. If enabled, stricter requirements are then applied:
#    - Required combinations: Must have keywords from specified category pairs
#    - Minimum density: Keyword matches per 1000 characters
#    - Boost keywords: Add bonus points for high-value phrases
#    - Penalty keywords: Subtract points for generic content indicators
#
# Set 'enabled: false' under any section to disable that check.

stricter_requirements:
  # ---------------------------------------------------------------------------
  # REQUIRED COMBINATIONS
  # ---------------------------------------------------------------------------
  # At least ONE combination must be satisfied for a page to pass.
  # Each combination requires keywords from BOTH specified categories.
  #
  # This ensures pages are about BOTH data centers AND heat/energy topics,
  # not just one or the other.
  #
  # Set 'enabled: false' to skip this check entirely.
  # ---------------------------------------------------------------------------
  required_combinations:
    enabled: true

    # Require at least this many matches from EACH category in a combination
    # Set to 1 for strict (must have both), 0 to effectively disable
    min_matches_per_category: 1

    # List of required combinations - page must satisfy AT LEAST ONE
    # Format: { primary: "category_name", secondary: "category_name" }
    combinations:
      # Most common: data center context + heat/subject keywords
      - primary: "context"        # data center, server farm, etc.
        secondary: "subject"      # waste heat, heat recovery, etc.

      # Policy document about data centers
      - primary: "context"
        secondary: "policy_type"  # regulation, law, directive, etc.

      # Heat subject + policy indicators
      - primary: "subject"
        secondary: "policy_type"

      # Heat subject + incentive programs
      - primary: "subject"
        secondary: "incentives"   # grant, subsidy, tax credit, etc.

      # Energy efficiency + policy type (catches broader energy regulations)
      - primary: "energy"
        secondary: "policy_type"  # regulation, law, directive, etc.

  # ---------------------------------------------------------------------------
  # KEYWORD DENSITY
  # ---------------------------------------------------------------------------
  # Minimum keyword matches per 1000 characters of content.
  # Helps filter out pages that only mention keywords once in passing.
  #
  # Example values:
  #   0.0  = disabled (no density requirement)
  #   0.5  = very lenient (1 match per 2000 chars)
  #   1.0  = moderate (1 match per 1000 chars)
  #   2.0  = strict (2 matches per 1000 chars)
  #   3.0  = very strict (3 matches per 1000 chars)
  # ---------------------------------------------------------------------------
  density:
    enabled: false
    min_density: 0  # Disabled: required_combinations + LLM screening provide sufficient filtering

    # Only count matches from these categories for density calculation
    # Leave empty [] to count all categories
    # Recommended: count high-value categories only
    categories_to_count:
      - subject       # Core heat reuse terms
      - policy_type   # Policy indicators
      - incentives    # Financial incentives
      - context     # Uncomment to include data center terms
      # - enabling    # Uncomment to include enabling action terms

  # ---------------------------------------------------------------------------
  # BOOST KEYWORDS
  # ---------------------------------------------------------------------------
  # High-value phrases that strongly indicate relevant content.
  # When found, these ADD to the keyword score.
  #
  # These are exact phrases (case-insensitive) that are very specific
  # to data center heat reuse policies.
  # ---------------------------------------------------------------------------
  boost_keywords:
    enabled: true
    boost_amount: 3.0  # Points added per boost keyword found

    terms:
      # English - highly specific phrases
      - "data center heat reuse"
      - "data centre heat reuse"
      - "waste heat recovery from data"
      - "data center waste heat"
      - "data centre waste heat"
      - "heat reuse obligation"
      - "heat recovery requirement"
      - "district heating data center"
      - "district heating data centre"
      - "mandatory heat recovery"
      - "energy reuse effectiveness"
      - "ERE"  # Energy Reuse Effectiveness metric

      # US legislative session terms
      - "2025 session"
      - "2026 session"
      - "enacted 2025"
      - "enacted 2026"

      # German
      - "Abwärmenutzungspflicht"
      - "Rechenzentrumsabwärme"
      - "Fernwärme Rechenzentrum"

      # Swedish
      - "spillvärme datacenter"
      - "fjärrvärme datacenter"

      # Dutch
      - "restwarmte datacenter"
      - "warmtenet datacenter"

      # French
      - "chaleur fatale centre de données"
      - "réseau de chaleur data center"

      # Norwegian
      - "spillvarme datasenter"
      - "fjernvarme datasenter"
      - "overskuddsvarme datasenter"

      # Danish
      - "overskudsvarme datacenter"
      - "fjernvarme datacenter"

      # Finnish
      - "hukkalämpö datakeskus"
      - "kaukolämpö datakeskus"

      # Polish
      - "ciepło odpadowe centrum danych"
      - "odzysk ciepła centrum danych"

      # Portuguese
      - "calor residual centro de dados"

      # Czech
      - "odpadní teplo datové centrum"

      # Greek
      - "απόβλητη θερμότητα κέντρο δεδομένων"

      # Hungarian
      - "hulladékhő adatközpont"
      - "hőhasznosítás adatközpont"

      # Romanian
      - "căldură reziduală centru de date"

  # ---------------------------------------------------------------------------
  # PENALTY KEYWORDS
  # ---------------------------------------------------------------------------
  # Phrases indicating generic content that's likely NOT a policy document.
  # When found, these SUBTRACT from the keyword score.
  #
  # Use this to down-rank pages about general topics that happen to
  # mention data centers or heat in passing.
  # ---------------------------------------------------------------------------
  penalty_keywords:
    enabled: true
    penalty_amount: 2.0  # Points subtracted per penalty keyword found

    terms:
      # Generic website content
      - "cookie policy"
      - "privacy policy"
      - "terms of service"
      - "terms and conditions"
      - "subscribe to newsletter"
      - "sign up for updates"

      # Job postings
      - "job opening"
      - "career opportunity"
      - "we are hiring"
      - "apply now"
      - "join our team"

      # Product marketing (not policy)
      - "buy now"
      - "add to cart"
      - "free trial"
      - "request a demo"
      - "contact sales"

      # News/blog indicators (usually not policy documents)
      - "posted on"
      - "written by"
      - "share this article"
      - "related articles"
      - "leave a comment"

      # Generic energy content (not specific to heat reuse)
      - "solar panel installation"
      - "wind farm project"
      - "electric vehicle charging"

  # ---------------------------------------------------------------------------
  # CATEGORY REQUIREMENTS
  # ---------------------------------------------------------------------------
  # Require matches from specific categories to pass filtering.
  # This is simpler than combinations - just checks if categories are present.
  # ---------------------------------------------------------------------------
  category_requirements:
    enabled: false  # Disabled by default - use combinations instead

    # Must have matches from ALL of these categories
    # Example: require both subject AND context
    require_all: []

    # Must have matches from AT LEAST ONE of these categories
    # Example: require either policy_type OR incentives
    require_any: []