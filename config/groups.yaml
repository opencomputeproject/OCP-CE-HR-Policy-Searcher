# =============================================================================
# DOMAIN GROUPS
# =============================================================================
# Define custom groups for selective scanning with --domains flag
#
# HOW TO USE:
# 1. Create a group by adding an entry below
# 2. List the domain IDs you want included (from any domains/*.yaml file)
# 3. Run with: python -m src.main --domains your_group_name
#
# EXAMPLES:
#   python -m src.main --domains eu          # All European domains
#   python -m src.main --domains quick       # Fast 2-domain test
#   python -m src.main --domains my_custom   # Your custom group
#
# TIP: You can create groups for any combination of domains!
# =============================================================================

groups:

  # ---------------------------------------------------------------------------
  # SPECIAL GROUPS
  # ---------------------------------------------------------------------------

  all:
    description: "All enabled domains from all files"
    # This group automatically includes ALL domains where enabled: true
    # No need to list domain IDs - it's handled by the loader

