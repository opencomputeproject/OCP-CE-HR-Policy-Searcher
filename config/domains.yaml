# =============================================================================
# DOMAIN CONFIGURATION
# =============================================================================
# This file defines which government websites to crawl for policies.
#
# To add a new domain:
# 1. Copy an existing domain entry
# 2. Update the fields
# 3. Test with: python -m src.main --domains test --test-domain your_domain_id
# 4. Submit a PR
# =============================================================================

domains:
  # ---------------------------------------------------------------------------
  # EUROPEAN UNION
  # ---------------------------------------------------------------------------

  - name: "German Federal Ministry for Economic Affairs and Climate Action"
    id: "bmwk_de"
    enabled: true
    base_url: "https://www.bmwk.de"
    start_paths:
      - "/Redaktion/EN/Artikel/Energy/"
      - "/Redaktion/EN/Dossier/energy-efficiency.html"
      - "/Redaktion/DE/Artikel/Energie/"
    allowed_path_patterns:
      - "/Redaktion/*/Artikel/*"
      - "/Redaktion/*/Dossier/*"
    blocked_path_patterns:
      - "/Redaktion/*/Video/*"
      - "/Redaktion/*/Bilderstrecke/*"
    max_depth: 3
    language: "de"
    requires_playwright: false
    rate_limit_seconds: 3.0
    verified_by: "OCP Heat Reuse Group"
    verified_date: "2024-10-31"
    notes: |
      Primary source for German Energy Efficiency Act (EnEfG).
      Section 5 covers waste heat requirements for data centers.

  - name: "European Commission - Energy"
    id: "ec_europa_energy"
    enabled: true
    base_url: "https://energy.ec.europa.eu"
    start_paths:
      - "/topics/energy-efficiency"
      - "/topics/energy-efficiency/energy-efficiency-targets-directive-and-rules"
      - "/news"
    allowed_path_patterns:
      - "/topics/*"
      - "/news/*"
    blocked_path_patterns:
      - "/system/files/*"  # Direct file downloads
    max_depth: 3
    language: "en"
    requires_playwright: false
    rate_limit_seconds: 2.0
    verified_by: "OCP Heat Reuse Group"
    verified_date: "2024-10-31"
    notes: |
      EU Energy Efficiency Directive and related policies.

  - name: "EUR-Lex (EU Law)"
    id: "eur_lex"
    enabled: true
    base_url: "https://eur-lex.europa.eu"
    start_paths:
      - "/search.html?scope=EURLEX&text=data+center+energy"
      - "/legal-content/EN/TXT/?uri=CELEX:32023L1791"  # EED recast
    allowed_path_patterns:
      - "/legal-content/*"
    max_depth: 2
    language: "en"
    requires_playwright: true  # Search requires JS
    rate_limit_seconds: 3.0
    notes: "Official EU legislation database"

  - name: "Dutch Government - RVO"
    id: "rvo_nl"
    enabled: true
    base_url: "https://www.rvo.nl"
